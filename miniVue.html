<body>
<div id="app"></div>
<script>

    function reactive(target){
        const deps = {}
        const handler ={
            get(target,key){
                if(activeFn)deps[key]=activeFn
                return target[key]
            },
            set(target,key,value){
                target[key]=value
                if(deps[key])deps[key]()
                return true
            }

        }
        const proxy = new Proxy(target,handler)
        return proxy
    }
    let activeFn = null
    function effect(fn){
        activeFn=fn 
        fn()
        activeFn = null
    }
    function createApp(options){
        return{
            mount(selector){
                const el = document.querySelector(selector)
                const methods = options.methods || {}

                const data = reactive(options.data())
                Object.keys(methods).forEach(key=>{
                    data[key] = methods[key].bind(data)
                })
                 el.addEventListener('click', (e) => {
                        if (e.target.tagName === 'BUTTON') {
                            data.add()
                            }
                    })
                effect(()=>{
                    el.innerHTML = options.template(data)
                })
            }
        }
    }
    const app = createApp({
        data(){
            return {count:0,name:'zahngsan'}
        },
        template(data){
            return`<div > ${data.count}:${data.name}</div>
            <button>+1</button>`
        },methods:{
            add() {
                this.count+=2
            }
        }
    })
    app.mount('#app')
  const state = reactive({ count: 0 })

// effect(() => {
//   console.log('count是:', state.count)
// })

state.count = 1
state.count = 2
</script>
</body>
