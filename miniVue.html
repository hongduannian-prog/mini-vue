<script>

    function computed(getter){
        let _dirty = true
        let _value     
      
          effect(()=>{
                _dirty = true
                getter()
            }) 
        return{
            
            get value(){
                  if(_dirty){
            
                    _dirty = false
                    _value = getter()
                     _dirty = false
                    
                }  
                return _value   
              
            }
           
        }

    }
        function reactive(target){
        const deps = {}
        const handler ={
            get(target,key){
                if(activeFn)deps[key]=activeFn
                return target[key]
            },
            set(target,key,value){
                target[key]=value
                if(deps[key])deps[key]()
                return true
            }

        }
        const proxy = new Proxy(target,handler)
        return proxy
    }
    let activeFn = null
    function effect(fn){
        activeFn=fn 
        fn()
        activeFn = null
    }

const state = reactive({ count: 0 })
const double = computed(() => state.count * 2)

console.log(double.value)  // 0
state.count = 1
console.log(double.value)  // 2

console.log(double.value)  // 应该还是2，不会重新计算
console.log(double.value)  // 还是2
state.count = 3
console.log(double.value)  // 6
</script>
